<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glow Clinic AR - Dr. Maya Cohen</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a;
        }

        #cameraFeed {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        #glowCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
        }

        .ui-overlay {
            position: absolute;
            z-index: 10;
            pointer-events: auto;
        }

        .top-bar {
            top: 16px;
            left: 16px;
            right: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .clinic-header {
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 12px 20px;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            font-size: 14px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .control-buttons {
            display: flex;
            gap: 12px;
        }

        .btn {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
            color: white;
            font-size: 20px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        .speech-bubble {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 16px 24px;
            border-radius: 16px;
            max-width: 280px;
            text-align: center;
            color: #333;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            white-space: normal;
            word-wrap: break-word;
        }

        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 8px solid rgba(255, 255, 255, 0.95);
        }

        .bottom-bar {
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .social-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            transition: all 0.3s ease;
        }

        .social-icon:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(1.1);
        }

        .info-panel {
            position: absolute;
            bottom: 80px;
            right: 20px;
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 16px;
            border-radius: 12px;
            color: white;
            max-width: 200px;
            text-align: center;
        }

        .info-panel h3 {
            font-size: 12px;
            margin-bottom: 8px;
            opacity: 0.8;
        }

        .info-panel p {
            font-size: 11px;
            line-height: 1.4;
            opacity: 0.9;
        }

        .permission-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .permission-dialog {
            background: white;
            padding: 32px;
            border-radius: 16px;
            text-align: center;
            max-width: 300px;
        }

        .permission-dialog h2 {
            color: #333;
            margin-bottom: 16px;
            font-size: 18px;
        }

        .permission-dialog p {
            color: #666;
            margin-bottom: 24px;
            font-size: 14px;
            line-height: 1.5;
        }

        .permission-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .permission-btn {
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .permission-btn-primary {
            background: #667eea;
            color: white;
        }

        .permission-btn-primary:hover {
            background: #5a67d8;
        }

        .permission-btn-secondary {
            background: #e2e8f0;
            color: #333;
        }

        .permission-btn-secondary:hover {
            background: #cbd5e0;
        }

        @media (max-width: 480px) {
            .clinic-header {
                font-size: 12px;
                padding: 8px 12px;
            }

            .speech-bubble {
                max-width: 200px;
                font-size: 12px;
                padding: 12px 16px;
            }

            .info-panel {
                max-width: 160px;
                padding: 12px;
                right: 12px;
                bottom: 70px;
            }
        }
    </style>
</head>
<body>
    <video id="cameraFeed" autoplay playsinline muted></video>
    <canvas id="glowCanvas"></canvas>

    <div class="ui-overlay top-bar">
        <div class="clinic-header">✨ Glow Clinic AR</div>
        <div class="control-buttons">
            <button class="btn" id="flipCameraBtn" title="Flip Camera">📷</button>
            <button class="btn" id="downloadVCardBtn" title="Download Contact">📥</button>
        </div>
    </div>

    <div class="ui-overlay speech-bubble" id="speechBubble">
        Hello! I'm Dr. Maya Cohen
    </div>

    <div class="ui-overlay bottom-bar">
        <a href="https://instagram.com" class="social-icon" title="Instagram">📷</a>
        <a href="https://facebook.com" class="social-icon" title="Facebook">👍</a>
        <a href="https://tiktok.com" class="social-icon" title="TikTok">🎵</a>
    </div>

    <div class="ui-overlay info-panel">
        <h3>Dr. Maya Cohen</h3>
        <p>Aesthetic Medicine Specialist</p>
        <p>📧 maya@glowclinic.com</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // ============================================
        // CAMERA INITIALIZATION & SETUP
        // ============================================
        const cameraFeed = document.getElementById('cameraFeed');
        const glowCanvas = document.getElementById('glowCanvas');
        const ctx = glowCanvas.getContext('2d');
        let currentCamera = 'user'; // 'user' for front, 'environment' for rear

        // Resize canvas to match window
        function resizeCanvas() {
            glowCanvas.width = window.innerWidth;
            glowCanvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Initialize camera
        async function initializeCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: currentCamera,
                        width: { ideal: 1920 },
                        height: { ideal: 1080 }
                    },
                    audio: false
                });
                cameraFeed.srcObject = stream;
                await new Promise(resolve => {
                    cameraFeed.onloadedmetadata = () => {
                        cameraFeed.play();
                        resolve();
                    };
                });
                initializeAR();
            } catch (err) {
                console.error('Camera error:', err);
                // Try fallback camera
                if (currentCamera === 'environment') {
                    currentCamera = 'user';
                    initializeCamera();
                } else {
                    showPermissionDialog();
                }
            }
        }

        // Permission dialog
        function showPermissionDialog() {
            const overlay = document.createElement('div');
            overlay.className = 'permission-overlay';
            overlay.innerHTML = `
                <div class="permission-dialog">
                    <h2>Camera Access Required</h2>
                    <p>This AR experience needs camera access to work.</p>
                    <div class="permission-buttons">
                        <button class="permission-btn permission-btn-primary" onclick="location.reload()">Try Again</button>
                        <button class="permission-btn permission-btn-secondary" onclick="this.parentElement.parentElement.parentElement.remove()">Cancel</button>
                    </div>
                </div>
            `;
            document.body.appendChild(overlay);
        }

        // Flip camera
        document.getElementById('flipCameraBtn').addEventListener('click', () => {
            currentCamera = currentCamera === 'user' ? 'environment' : 'user';
            if (cameraFeed.srcObject) {
                cameraFeed.srcObject.getTracks().forEach(track => track.stop());
            }
            initializeCamera();
        });

        // ============================================
        // THREE.JS AR SCENE SETUP
        // ============================================
        let scene, camera, renderer, avatar, decorations = [];
        let avatarAnimation = {
            breathingPhase: 0,
            mouthOpen: 0,
            blinkPhase: 0,
            swayAngle: 0
        };

        function initializeAR() {
            // Scene setup
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 3;

            renderer = new THREE.WebGLRenderer({ canvas: glowCanvas, alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setClearColor(0x000000, 0);
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.0;

            // Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.6);
            directionalLight.position.set(5, 5, 5);
            scene.add(directionalLight);

            // Create avatar and decorations
            avatar = createAvatar();
            scene.add(avatar);

            createDecorations();
            createParticleSystem();

            // Device orientation
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                // iOS 13+
                document.addEventListener('click', () => {
                    DeviceOrientationEvent.requestPermission().then(permission => {
                        if (permission === 'granted') {
                            window.addEventListener('deviceorientation', handleDeviceOrientation);
                        }
                    }).catch(console.error);
                }, { once: true });
            } else {
                // Non-iOS or older iOS
                window.addEventListener('deviceorientation', handleDeviceOrientation);
            }

            // Touch controls
            document.addEventListener('touchmove', handleTouchMove, false);

            // Animation loop
            animate();
        }

        // ============================================
        // AVATAR CREATION
        // ============================================
        function createAvatar() {
            const group = new THREE.Group();
            group.position.y = 0;

            // Head
            const headGeometry = new THREE.SphereGeometry(0.4, 32, 32);
            const skinMaterial = new THREE.MeshStandardMaterial({
                color: 0xfdbcb4,
                roughness: 0.4,
                metalness: 0.0
            });
            const head = new THREE.Mesh(headGeometry, skinMaterial);
            head.position.y = 0.4;
            head.castShadow = true;
            group.add(head);

            // Hair - Top
            const hairTopGeometry = new THREE.SphereGeometry(0.42, 32, 32, 0, Math.PI * 2, 0, Math.PI / 2);
            const hairMaterial = new THREE.MeshStandardMaterial({
                color: 0x4a3728,
                roughness: 0.7,
                metalness: 0.1
            });
            const hairTop = new THREE.Mesh(hairTopGeometry, hairMaterial);
            hairTop.position.y = 0.6;
            group.add(hairTop);

            // Hair - Back
            const hairBackGeometry = new THREE.ConeGeometry(0.35, 0.8, 32);
            const hairBack = new THREE.Mesh(hairBackGeometry, hairMaterial);
            hairBack.position.set(0, 0.1, -0.3);
            hairBack.scale.set(1, 1, 0.6);
            group.add(hairBack);

            // Hair - Sides
            const hairSideGeometry = new THREE.SphereGeometry(0.15, 16, 16);
            const hairLeft = new THREE.Mesh(hairSideGeometry, hairMaterial);
            hairLeft.position.set(-0.45, 0.3, 0);
            hairLeft.scale.set(0.8, 1.2, 0.7);
            group.add(hairLeft);

            const hairRight = hairLeft.clone();
            hairRight.position.x = 0.45;
            group.add(hairRight);

            // Hair - Bangs
            const bangsGeometry = new THREE.SphereGeometry(0.2, 16, 16, 0, Math.PI, 0, Math.PI / 2.5);
            const bangs = new THREE.Mesh(bangsGeometry, hairMaterial);
            bangs.position.set(0, 0.5, 0.35);
            bangs.scale.set(1.5, 0.8, 0.5);
            group.add(bangs);

            // Eyes - White
            const eyeWhiteGeometry = new THREE.SphereGeometry(0.08, 16, 16);
            const eyeWhiteMaterial = new THREE.MeshStandardMaterial({ color: 0xffffff });
            const eyeLeftWhite = new THREE.Mesh(eyeWhiteGeometry, eyeWhiteMaterial);
            eyeLeftWhite.position.set(-0.12, 0.55, 0.35);
            group.add(eyeLeftWhite);

            const eyeRightWhite = eyeLeftWhite.clone();
            eyeRightWhite.position.x = 0.12;
            group.add(eyeRightWhite);

            // Eyes - Iris
            const irisGeometry = new THREE.SphereGeometry(0.045, 16, 16);
            const irisMaterial = new THREE.MeshStandardMaterial({ color: 0x6b4423 });
            const irisLeft = new THREE.Mesh(irisGeometry, irisMaterial);
            irisLeft.position.set(-0.12, 0.55, 0.41);
            group.add(irisLeft);

            const irisRight = irisLeft.clone();
            irisRight.position.x = 0.12;
            group.add(irisRight);

            // Eyes - Pupils
            const pupilGeometry = new THREE.SphereGeometry(0.025, 16, 16);
            const pupilMaterial = new THREE.MeshStandardMaterial({ color: 0x000000 });
            const pupilLeft = new THREE.Mesh(pupilGeometry, pupilMaterial);
            pupilLeft.position.set(-0.12, 0.55, 0.44);
            group.add(pupilLeft);

            const pupilRight = pupilLeft.clone();
            pupilRight.position.x = 0.12;
            group.add(pupilRight);

            // Eye lids
            const lidGeometry = new THREE.SphereGeometry(0.09, 16, 8, 0, Math.PI);
            const lidMaterial = new THREE.MeshStandardMaterial({ color: 0xfdbcb4 });
            const lidTop = new THREE.Mesh(lidGeometry, lidMaterial);
            lidTop.position.set(0, 0.62, 0.35);
            lidTop.scale.set(2, 0.8, 0.5);
            group.add(lidTop);

            // Eyebrows
            const browGeometry = new THREE.SphereGeometry(0.06, 16, 8, 0, Math.PI);
            const browMaterial = new THREE.MeshStandardMaterial({ color: 0x3a2818 });
            const browLeft = new THREE.Mesh(browGeometry, browMaterial);
            browLeft.position.set(-0.12, 0.68, 0.35);
            browLeft.rotation.z = 0.3;
            browLeft.scale.set(1.2, 0.6, 0.5);
            group.add(browLeft);

            const browRight = browLeft.clone();
            browRight.position.x = 0.12;
            browRight.rotation.z = -0.3;
            group.add(browRight);

            // Nose
            const noseGeometry = new THREE.ConeGeometry(0.05, 0.15, 16);
            const noseMaterial = new THREE.MeshStandardMaterial({ color: 0xf5a89f });
            const nose = new THREE.Mesh(noseGeometry, noseMaterial);
            nose.position.set(0, 0.45, 0.38);
            nose.scale.set(1, 0.8, 0.6);
            group.add(nose);

            // Mouth
            const mouthGeometry = new THREE.SphereGeometry(0.08, 16, 16, 0, Math.PI, 0, Math.PI / 2);
            const mouthMaterial = new THREE.MeshStandardMaterial({ color: 0xe74c6d });
            const mouth = new THREE.Mesh(mouthGeometry, mouthMaterial);
            mouth.position.set(0, 0.32, 0.38);
            mouth.scale.set(1, 0.3, 0.5);
            mouth.userData.originalScale = { x: 1, y: 0.3, z: 0.5 };
            group.add(mouth);

            // Neck
            const neckGeometry = new THREE.CylinderGeometry(0.15, 0.2, 0.2, 16);
            const neckMaterial = new THREE.MeshStandardMaterial({ color: 0xfdbcb4 });
            const neck = new THREE.Mesh(neckGeometry, neckMaterial);
            neck.position.y = 0.05;
            group.add(neck);

            // Body - Medical coat
            const coatGeometry = new THREE.CylinderGeometry(0.35, 0.4, 0.8, 16);
            const coatMaterial = new THREE.MeshStandardMaterial({ color: 0xffffff });
            const coat = new THREE.Mesh(coatGeometry, coatMaterial);
            coat.position.y = -0.35;
            group.add(coat);

            // Arms
            const armGeometry = new THREE.CylinderGeometry(0.08, 0.08, 0.6, 16);
            const armMaterial = new THREE.MeshStandardMaterial({ color: 0xfdbcb4 });

            const armLeft = new THREE.Mesh(armGeometry, armMaterial);
            armLeft.position.set(-0.35, -0.1, 0);
            armLeft.rotation.z = 0.3;
            group.add(armLeft);

            const armRight = armLeft.clone();
            armRight.position.x = 0.35;
            armRight.rotation.z = -0.3;
            group.add(armRight);

            // Hands
            const handGeometry = new THREE.SphereGeometry(0.07, 16, 16);
            const handMaterial = new THREE.MeshStandardMaterial({ color: 0xfdbcb4 });

            const handLeft = new THREE.Mesh(handGeometry, handMaterial);
            handLeft.position.set(-0.35, -0.45, 0);
            group.add(handLeft);

            const handRight = handLeft.clone();
            handRight.position.x = 0.35;
            group.add(handRight);

            // Stethoscope pendant
            const stethoscopeHeadGeometry = new THREE.TorusGeometry(0.15, 0.02, 8, 32);
            const stethoscopeMaterial = new THREE.MeshStandardMaterial({ color: 0xd4af37 });
            const stethoscopeHead = new THREE.Mesh(stethoscopeHeadGeometry, stethoscopeMaterial);
            stethoscopeHead.position.set(0, -0.2, 0.3);
            stethoscopeHead.rotation.x = Math.PI / 3;
            group.add(stethoscopeHead);

            // Name tag
            const tagGeometry = new THREE.PlaneGeometry(0.3, 0.15);
            const tagMaterial = new THREE.MeshStandardMaterial({ color: 0xfffacd });
            const nameTag = new THREE.Mesh(tagGeometry, tagMaterial);
            nameTag.position.set(0, -0.5, 0.35);
            group.add(nameTag);

            // Skirt
            const skirtGeometry = new THREE.ConeGeometry(0.45, 0.6, 32);
            const skirtMaterial = new THREE.MeshStandardMaterial({ color: 0x2a2a4a });
            const skirt = new THREE.Mesh(skirtGeometry, skirtMaterial);
            skirt.position.y = -0.8;
            group.add(skirt);

            group.userData.mouth = mouth;
            return group;
        }

        // ============================================
        // DECORATIONS & PARTICLES
        // ============================================
        function createDecorations() {
            // Rose gold torus rings
            for (let i = 0; i < 3; i++) {
                const ringGeometry = new THREE.TorusGeometry(1.5 + i * 0.5, 0.08, 8, 100);
                const ringMaterial = new THREE.MeshStandardMaterial({
                    color: 0xe8b4a8,
                    metalness: 0.7,
                    roughness: 0.2
                });
                const ring = new THREE.Mesh(ringGeometry, ringMaterial);
                ring.rotation.x = Math.random() * Math.PI;
                ring.rotation.y = Math.random() * Math.PI;
                ring.userData.rotationSpeed = 0.2 + Math.random() * 0.3;
                ring.userData.rotationAxis = new THREE.Vector3(
                    Math.random() - 0.5,
                    Math.random() - 0.5,
                    Math.random() - 0.5
                ).normalize();
                scene.add(ring);
                decorations.push(ring);
            }

            // Beauty bubbles
            for (let i = 0; i < 5; i++) {
                const bubbleGeometry = new THREE.IcosahedronGeometry(0.1 + Math.random() * 0.1, 4);
                const bubbleMaterial = new THREE.MeshStandardMaterial({
                    color: 0xd4af37,
                    metalness: 0.6,
                    roughness: 0.3,
                    transparent: true,
                    opacity: 0.7
                });
                const bubble = new THREE.Mesh(bubbleGeometry, bubbleMaterial);
                bubble.position.set(
                    (Math.random() - 0.5) * 4,
                    (Math.random() - 0.5) * 3,
                    (Math.random() - 0.5) * 2
                );
                bubble.userData.floatSpeed = 0.3 + Math.random() * 0.5;
                bubble.userData.floatPhase = Math.random() * Math.PI * 2;
                scene.add(bubble);
                decorations.push(bubble);
            }

            // Orbiting crystals
            for (let i = 0; i < 4; i++) {
                const crystalGeometry = new THREE.OctahedronGeometry(0.15, 2);
                const crystalMaterial = new THREE.MeshStandardMaterial({
                    color: 0xc0ffee,
                    metalness: 0.9,
                    roughness: 0.1
                });
                const crystal = new THREE.Mesh(crystalGeometry, crystalMaterial);
                crystal.position.set(
                    Math.cos(i * Math.PI / 2) * 1.5,
                    Math.sin(i * Math.PI / 2) * 1.5,
                    0
                );
                crystal.userData.orbitRadius = 1.5;
                crystal.userData.orbitSpeed = 0.3 + Math.random() * 0.2;
                crystal.userData.orbitPhase = i * Math.PI / 2;
                scene.add(crystal);
                decorations.push(crystal);
            }

            // Falling petals
            for (let i = 0; i < 6; i++) {
                const petalGeometry = new THREE.SphereGeometry(0.05, 8, 8);
                const petalMaterial = new THREE.MeshStandardMaterial({ color: 0xffb6c1 });
                const petal = new THREE.Mesh(petalGeometry, petalMaterial);
                petal.position.set(
                    (Math.random() - 0.5) * 3,
                    2,
                    (Math.random() - 0.5) * 2
                );
                petal.userData.fallSpeed = 0.2 + Math.random() * 0.3;
                petal.userData.swayAmount = 0.5 + Math.random() * 0.5;
                petal.userData.swaySpeed = 1 + Math.random() * 1;
                scene.add(petal);
                decorations.push(petal);
            }
        }

        function createParticleSystem() {
            const particleCount = 200;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const colors = new Float32Array(particleCount * 3);

            for (let i = 0; i < particleCount; i++) {
                positions[i * 3] = (Math.random() - 0.5) * 4;
                positions[i * 3 + 1] = (Math.random() - 0.5) * 3;
                positions[i * 3 + 2] = (Math.random() - 0.5) * 2;

                colors[i * 3] = 0.8 + Math.random() * 0.2;
                colors[i * 3 + 1] = 0.6 + Math.random() * 0.3;
                colors[i * 3 + 2] = 1;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: 0.02,
                vertexColors: true,
                transparent: true,
                blending: THREE.AdditiveBlending
            });

            const particles = new THREE.Points(geometry, material);
            scene.add(particles);
        }

        // ============================================
        // ANIMATION & INTERACTION
        // ============================================
        function handleDeviceOrientation(event) {
            const alpha = event.alpha || 0;
            const beta = event.beta || 0;
            const gamma = event.gamma || 0;

            camera.rotation.order = 'YXZ';
            camera.rotation.y = THREE.MathUtils.degToRad(-alpha);
            camera.rotation.x = THREE.MathUtils.degToRad(-beta);
        }

        function handleTouchMove(event) {
            if (event.touches.length > 0) {
                const touch = event.touches[0];
                const x = (touch.clientX / window.innerWidth) * 2 - 1;
                const y = -(touch.clientY / window.innerHeight) * 2 + 1;
                camera.position.x = x * 0.5;
                camera.position.y = y * 0.5;
            }
        }

        let speechIndex = 0;
        const speeches = [
            "Hello! I'm Dr. Maya Cohen",
            "Welcome to Glow Clinic!",
            "Let's enhance your natural beauty",
            "Medical-grade aesthetic solutions",
            "Your confidence is my priority"
        ];

        function updateSpeech() {
            const bubble = document.getElementById('speechBubble');
            bubble.textContent = speeches[speechIndex];
            speechIndex = (speechIndex + 1) % speeches.length;
        }

        function animate() {
            requestAnimationFrame(animate);

            // Avatar breathing
            avatarAnimation.breathingPhase += 0.01;
            avatar.position.y = Math.sin(avatarAnimation.breathingPhase) * 0.05;

            // Mouth animation
            avatarAnimation.mouthOpen += 0.04;
            const mouth = avatar.userData.mouth;
            const openAmount = Math.abs(Math.sin(avatarAnimation.mouthOpen)) * 0.3;
            mouth.scale.y = mouth.userData.originalScale.y + openAmount;

            // Blinking
            avatarAnimation.blinkPhase += 0.02;
            if (Math.sin(avatarAnimation.blinkPhase) > 0.8) {
                avatar.children[5].scale.y = 0.1; // Top lid blink
            } else {
                avatar.children[5].scale.y = 1;
            }

            // Avatar sway
            avatarAnimation.swayAngle += 0.005;
            avatar.rotation.z = Math.sin(avatarAnimation.swayAngle) * 0.1;

            // Update decorations
            decorations.forEach((dec, i) => {
                if (dec.userData.rotationSpeed) {
                    dec.rotateOnWorldAxis(dec.userData.rotationAxis, dec.userData.rotationSpeed * 0.01);
                }
                if (dec.userData.floatSpeed) {
                    dec.position.y += Math.sin(Date.now() * 0.001 + dec.userData.floatPhase) * 0.01 * dec.userData.floatSpeed;
                }
                if (dec.userData.orbitSpeed) {
                    dec.userData.orbitPhase += dec.userData.orbitSpeed * 0.01;
                    dec.position.x = Math.cos(dec.userData.orbitPhase) * dec.userData.orbitRadius;
                    dec.position.y = Math.sin(dec.userData.orbitPhase) * dec.userData.orbitRadius * 0.6;
                }
                if (dec.userData.fallSpeed) {
                    dec.position.y -= dec.userData.fallSpeed * 0.01;
                    dec.position.x += Math.sin(Date.now() * 0.001 * dec.userData.swaySpeed) * 0.01 * dec.userData.swayAmount;
                    if (dec.position.y < -2) {
                        dec.position.y = 2;
                    }
                }
            });

            // Change speech periodically
            if (Math.random() < 0.01) {
                updateSpeech();
            }

            renderer.render(scene, camera);
        }

        // vCard download
        document.getElementById('downloadVCardBtn').addEventListener('click', () => {
            const vcard = `BEGIN:VCARD
VERSION:3.0
FN:Dr. Maya Cohen
TITLE:Aesthetic Medicine Specialist
ORG:Glow Clinic
TEL;TYPE=CELL:+972-50-XXX-XXXX
EMAIL:maya@glowclinic.com
URL:https://glowclinic.com
NOTE:AR Experience Powered by WebAR
END:VCARD`;

            const blob = new Blob([vcard], { type: 'text/vcard' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'Dr_Maya_Cohen.vcf';
            link.click();
            URL.revokeObjectURL(url);
        });

        // Start the app
        initializeCamera();

        // Handle window resize
        window.addEventListener('resize', () => {
            resizeCanvas();
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
